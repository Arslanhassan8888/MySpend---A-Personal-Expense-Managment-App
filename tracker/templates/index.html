<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>MySpend</title>
    </head>
    <body>
        <header>
            <nav>
                <a href="/register">Create Account</a>
                <a href="/login">Login</a>
            </nav>
            <h1>MySpend</h1>
        </header>
        <main>
            <section>
                <h2>Welcome</h2>
                <p>Your personal expense management app.</p>
                {% if user_id %}
                <p>You are logged in as user {{ user_id }}</p>
                {% else %}
                <p>You are not logged in</p>
                {% endif %}
            </section>
        </main>
    </body>
</html>

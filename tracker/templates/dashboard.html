<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>MySpend Dashboard</title>
        <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    </head>
    <body>
        <h1>MySpend Dashboard</h1>
        <h2>Welcome {{ name }}</h2>
        <p>Your personal finance space.</p>
        <a href="/add-expense">Add Expense</a>
        <br>
        <br>
        <h3>Your Expenses</h3>
        <form method="POST" action="/delete-selected-expenses">
            <table>
                <tr>
                    <th>Date</th>
                    <th>Category</th>
                    <th>Amount</th>
                    <th>Description</th>
                    <th>
                        Select
                        <br>
                        <input type="checkbox" id="select-all">
                    </th>
                </tr>
                {% for expense in expenses %}
                <tr>
                    <td>{{ expense.date }}</td>
                    <td>{{ expense.name }}</td>
                    <td>{{ expense.amount }}</td>
                    <td>{{ expense.description }}</td>
                    <td>
                        <input
                            type="checkbox"
                            class="expense-checkbox"
                            name="expense_ids"
                            value="{{ expense.expense_id }}"
                        >
                    </td>
                </tr>
                {% endfor %}
            </table>
            <br>
            <button id="delete-button" type="submit">
                Delete Selected
            </button>
        </form>
        <br>
        <a href="/logout">Logout</a>
        <script src="{{ url_for('static', filename='js/dashboard.js') }}"></script>
    </body>
</html>

<section
    id="searchModal"
    class="history-modal"
    hidden
>
    <h2 class="visually-hidden">Search modal</h2>

    <section class="history-modal-card">
        <h3 id="search-title">Search Expenses</h3>
        <p id="search-feedback" class="modal-feedback" hidden></p>

        <form
            id="searchForm"
            method="GET"
            action="/dashboard#expenses"
            novalidate
        >
            <section class="modal-field">
                <h4 class="visually-hidden">Description field</h4>
                <label for="search_description">Description</label>
                <input id="search_description" type="text" name="description">
            </section>

            <section class="modal-field">
                <h4 class="visually-hidden">Minimum amount field</h4>
                <label for="search_min_amount">Min Amount</label>
                <input
                    id="search_min_amount"
                    type="number"
                    name="min_amount"
                    min="0"
                    step="0.01"
                >
                <p id="search-min-hint" class="field-hint">Use positive numbers only.</p>
            </section>

            <section class="modal-field">
                <h4 class="visually-hidden">Maximum amount field</h4>
                <label for="search_max_amount">Max Amount</label>
                <input
                    id="search_max_amount"
                    type="number"
                    name="max_amount"
                    min="0"
                    step="0.01"
                >
                <p id="search-max-hint" class="field-hint">Use positive numbers only.</p>
            </section>

            <section class="modal-field">
                <h4 class="visually-hidden">Date from field</h4>
                <label for="search_date_from">Date From</label>
                <input id="search_date_from" type="date" name="date_from">
            </section>

            <section class="modal-field">
                <h4 class="visually-hidden">Date to field</h4>
                <label for="search_date_to">Date To</label>
                <input id="search_date_to" type="date" name="date_to">
            </section>

            <section class="modal-actions">
                <h4 class="visually-hidden">Modal actions</h4>
                <button type="submit" class="history-primary-button">Apply</button>
                <button type="button" class="history-secondary-button" onclick="closeSearchModal()">Cancel</button>
            </section>
        </form>
    </section>
</section>

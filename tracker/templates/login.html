<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | MySpend</title>
</head>
<body>

<header>
    <nav>
        <a href="/">Main menu</a>
    </nav>
    <h1>MySpend</h1>
    <p>Login</p>
</header>

<main>
    <section>
        <h2>Login</h2>

        <!-- Show error message -->
        {% if error %}
        <p style="color:red;" role="alert">{{ error }}</p>
        {% endif %}

        <form method="POST">
            <fieldset>
                <legend>Login</legend>

                <div>
                    <label>Email</label>
                    <input type="email" name="email" required>
                </div>

                <div>
                    <label>Password</label>
                    <input type="password" name="password" required>
                </div>

                <div>
                    <button type="submit">Login</button>
                </div>

            </fieldset>
        </form>

    </section>
</main>

</body>
</html>
